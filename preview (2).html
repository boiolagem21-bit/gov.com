<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Identidade Digital</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f2f2;
  text-align: center;
}

header {
  background: #0b5c8a;
  color: white;
  padding: 15px;
  font-size: 20px;
}

.container {
  margin-top: 40px;
  perspective: 1000px;
}

.card {
  width: 320px;
  height: 200px;
  margin: auto;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s;
}

.card.flip {
  transform: rotateY(180deg);
}

.face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
}

.back {
  transform: rotateY(180deg);
}

img {
  width: 100%;
  height: 100%;
  border-radius: 10px;
  object-fit: cover;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  background: #0b5c8a;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>

</head>
<body>

<header>Identidade Digital RJ</header>

<div class="container">
  <div class="card" id="card">
    
    <div class="face front">
      <img src="frente.jpg" alt="Frente">
    </div>

    <div class="face back">
      <img src="verso.jpg" alt="Verso">
    </div>

  </div>

  <button onclick="girar()">Girar</button>
</div>

<script>
function girar() {
  document.getElementById("card").classList.toggle("flip");
}
</script>

</body>
</html>
